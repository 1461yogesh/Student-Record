<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="registration-card max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-white/20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">Join Us</h1>
            <p class="text-slate-500 mt-2 font-medium">Create a new student profile</p>
        </div>

        <form id="studentForm" class="space-y-6">
            <div class="relative">
                <input type="text" id="name" required class="peer block w-full px-4 py-3 text-slate-900 bg-transparent border-2 border-slate-200 rounded-xl appearance-none focus:outline-none focus:ring-0 focus:border-indigo-600 placeholder-transparent" placeholder=" " />
                <label class="absolute text-sm text-slate-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2 peer-focus:text-indigo-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-3">Full Name</label>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <input type="text" id="roll" required class="peer block w-full px-4 py-3 text-slate-900 bg-transparent border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-600 placeholder-transparent" placeholder=" " />
                    <label class="absolute text-sm text-slate-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 left-3">Roll No.</label>
                </div>
                <div>
                    <select id="year" class="w-full px-4 py-3 text-slate-600 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-600 bg-white">
                        <option value="" disabled selected>Select Year</option>
                        <option>1</option><option>2</option><option>3</option><option>4</option>
                    </select>
                </div>
            </div>

            <div class="relative">
                <input type="email" id="email" required class="peer block w-full px-4 py-3 text-slate-900 bg-transparent border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-600 placeholder-transparent" placeholder=" " />
                <label class="absolute text-sm text-slate-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 left-3">Email Address</label>
            </div>

            <div class="relative">
                <input type="text" id="dept" required class="peer block w-full px-4 py-3 text-slate-900 bg-transparent border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-600 placeholder-transparent" placeholder=" " />
                <label class="absolute text-sm text-slate-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 peer-placeholder-shown:top-1/2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 left-3">Department</label>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
                Register Student
            </button>
        </form>
        
        <div id="status" class="mt-6 text-center text-sm font-semibold hidden p-3 rounded-lg"></div>
        
        <div class="mt-8 text-center">
            <a href="../Records Fetch Page/index.html" class="text-indigo-600 font-semibold hover:text-purple-600 transition flex items-center justify-center gap-2">
                View Directory <span class="text-xl">→</span>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
