<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Central | Management Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="hub-container">
        <header class="hero-section">
            <h1 class="animate-fade-in">Student Data <span class="text-gradient">Central</span></h1>
            <p class="subtitle">The unified command center for academic record management and student enrollment.</p>
        </header>

        <section class="grid-container">
            <div class="card glass-effect" onclick="location.href='./Registration Page/index.html'">
                <div class="card-icon">📝</div>
                <h2>Registration Portal</h2>
                <p>Onboard new students into the ecosystem with secure data entry forms.</p>
                <button class="cta-button">Open Portal</button>
            </div>

            <div class="card glass-effect" onclick="location.href='./Records Fetch Page/index.html'">
                <div class="card-icon">📊</div>
                <h2>Records Database</h2>
                <p>Access, filter, and manage existing student profiles and academic history.</p>
                <button class="cta-button">View Records</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
